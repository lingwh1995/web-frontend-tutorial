<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>操作元素内联样式</title>
    <style>
      .box {
        width: 200px;
        height: 200px;
        background-color: gold;
        border: 1px solid green !important;
      }
    </style>
    <script>
      /**
       * 操作元素内联样式指南
       *
       * 1. 基本语法：
       *    - 修改样式：box.style.width = '400px'
       *    - 读取样式：box.style.width
       *
       * 2. 命名规则：
       *    - JS 操作 background-color 等带有短横线（-）的属性时，需要去掉短横线，转为驼峰命名形式（如：backgroundColor）。
       *
       * 3. 优先级限制：
       *    - 如果样式被 !important 修饰了，JS 通过 .style 方式不能修改该样式。
       *
       * 4. 作用范围：
       *    - 通过 style 属性读取和设置的都是内联属性（Inline Styles）。
       */
      window.onload = () => {
        /**
         * 场景一：修改内联样式
         * 功能：通过点击按钮动态改变 box 元素的尺寸和背景颜色。
         */
        const changeInnerStyle = document.querySelectorAll('input[type="button"]')[0]
        changeInnerStyle.addEventListener('click', () => {
          const box = document.querySelector('.box')
          box.style.width = '400px'
          box.style.height = '400px'
          box.style.backgroundColor = 'tomato'
          box.style.border = '10px solid green' // 注意：由于 CSS 中定义了 !important，此处修改将无效
        })

        /**
         * 场景二：读取内联样式
         * 注意：只能读取到 style 属性设置的内联样式，无法读取到 style 标签或外部 CSS 文件中的样式。
         */
        const readInnerStyle = document.querySelectorAll('input[type="button"]')[1]
        readInnerStyle.addEventListener('click', () => {
          const box = document.querySelector('.box')
          alert(`宽度:${box.style.width}, 高度:${box.style.height}, 背景色:${box.style.backgroundColor}`)
        })
      }
    </script>
  </head>
  <body>
    <input type="button" value="修改内联样式" />
    <input type="button" value="读取内联样式" />
    <div class="box"></div>
  </body>
</html>
