<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>逻辑运算符与数据类型转换</title>
    <script type="text/javascript">
      /**
       * 1. JS 逻辑运算符概览
       *    - 一般情况下使用逻辑运算符会返回一个布尔值。
       *    - 逻辑运算符主要有三个：与 (&&)、或 (||)、非 (!)。
       *    - 在进行逻辑操作时，如果操作数不是布尔类型则会将其转换。
       *    - 布尔类型在进行计算。
       *    - 对应关系：非 (!)、与 (&&)、或 (||)。
       *
       * 2. 三种逻辑运算符详解
       *    - 与运算 (&&)
       *      - 特性
       *        - 与运算符使用 && 表示。
       *        - 可应用于任何数据类型，且不一定返回布尔值。
       *        - 对于非布尔值运算，会先将其转换为布尔值。
       *        - 对于布尔值运算：两个值都是 true 则返回 true，否则返回 false。
       *        - 对于非布尔值运算：若两个值都为 true 则返回第二个值；若有 false 则返回靠前的 false 值。
       *        - 短路特性：JS 中的与属于“短路与”，如果第一个值为 false，则不会看第二个值。
       *
       *    - 或运算 (||)
       *      - 特性
       *        - 或运算符使用 || 表示。
       *        - 可应用于任何数据类型，且不一定返回布尔值。
       *        - 对于非布尔值运算，会先将其转换为布尔值。
       *        - 对于布尔值运算：两个值都是 false 则返回 false，否则返回 true。
       *        - 对于非布尔值运算：若两个值都是 false 则返回第二个值；否则返回靠前的 true 的值。
       *        - 短路特性：JS 中的或属于“短路或”，如果第一个值为 true，则不会看第二个值。
       *
       *    - 非运算 (!)
       *      - 特性
       *        - 非运算符使用 ! 表示。
       *        - 可应用于任意值，无论类型如何，都会返回一个布尔值。
       *        - 对原值取反（如 true 变 false）。
       *      - 技巧
       *        - 连续两次取反 (!!) 可将任意值转换为 Boolean，原理同 Boolean()。
       *
       * 3. 巧记口诀
       *    - 与运算 (&&)：一假则假。
       *    - 或运算 (||)：一真则真。
       */

      // 使用非运算技巧将其他类型数据转换为Boolean类型数据
      let a = 'hello'
      a = !!a
      console.log(typeof a)
      console.log(a)

      let b = 100
      b = !!b
      console.log(typeof b)
      console.log(b)
    </script>
  </head>
  <body></body>
</html>
