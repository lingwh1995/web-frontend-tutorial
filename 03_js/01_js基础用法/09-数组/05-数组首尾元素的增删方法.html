<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>数组首尾元素的增删方法</title>
    <script type="text/javascript">
      const nums = [10, 20, 30, 40, 50]
      console.log(nums)
      console.log('------------01------------')

      /**
       * 头部操作 - 移除
       *
       * shift()
       * - 功能：取出数组头部第一个元素。
       * - 返回：返回这个被取出的元素。
       */
      console.log(nums.shift())
      console.log(nums)
      console.log('------------02------------')

      /**
       * 头部操作 - 添加
       *
       * unshift()
       * - 功能：给数组头部增加一个元素。
       * - 返回：返回增加元素后的【新数组长度】。
       */
      console.log(nums.unshift(10))
      console.log(nums)
      console.log('------------03------------')

      /**
       * 尾部操作 - 添加
       *
       * push()
       * - 功能：给数组尾部增加一个元素。
       * - 返回：返回增加元素后的【新数组长度】。
       */
      console.log(nums.push(60))
      console.log(nums)
      console.log('------------04------------')

      /**
       * 尾部操作 - 移除
       *
       * pop()
       * - 功能：取出数组尾部最后一个元素。
       * - 返回：返回这个被取出的元素。
       */
      console.log(nums.pop())
      console.log(nums)
      console.log('------------05------------')
    </script>
  </head>
  <body></body>
</html>
