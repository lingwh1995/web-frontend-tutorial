<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>数组的创建</title>
    <script type="text/javascript">
      // --- 方式一：字面量创建 ---
      const nums = [1, 2, 3, 4, 5]
      console.log(nums)
      console.log('------------01------------')

      /**
       * --- 方式二：构造函数创建 (new Array) ---
       * 1. 传入多个参数：创建一个包含这些元素的数组。
       * 2. 传入单个数字：创建一个具有指定长度（Length）的空数组。
       */
      const colors = new Array('red', 'yellow', 'blue')
      console.log(colors)

      const books = new Array(10) // 创建一个长度为 10 的数组
      console.log(books.length)
      console.log('------------02------------')

      // --- 方式三：动态添加成员 ---
      const fruits = []
      fruits[0] = 'apple'
      fruits[1] = 'orange'
      fruits[2] = 'banner'
      console.log(fruits)
      console.log(new Int16Array(10, 11))
      console.log('------------03------------')

      /**
       * Array.of()
       * - 功能：通过可变数量的参数创建一个新的 Array 实例。
       * - 特点：不考虑参数的数量或类型，始终将参数作为数组元素。
       */
      console.log(Array.of('foo', 2, 'bar', true))
      console.log(Array.of())
      console.log('------------04------------')

      /**
       * Array.from()
       * - 功能：从可迭代或类数组对象创建一个新的浅拷贝数组实例。
       * - 应用：常用于将字符串（无分隔符）或 Set/NodeList 转换为数组。
       */
      console.log(Array.from('12345'))
      console.log(Array.from(new Set([1, 2, 2, 3, 4])))
      console.log('------------05------------')
    </script>
  </head>
  <body></body>
</html>
