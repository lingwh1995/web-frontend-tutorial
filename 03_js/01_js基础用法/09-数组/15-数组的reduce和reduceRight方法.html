<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>数组的 reduce 和 reduceRight 方法</title>
    <script type="text/javascript">
      let nums = [10, 20, 30, 40, 50]
      console.log(nums)
      console.log('------------01------------')

      /**
       * 1. reduce() —— 【从左到右归约】
       *
       * - 功能：对数组中的每个元素按序执行提供的 reducer 函数。
       * - 原理：每一次运行会将先前元素的计算结果（累加器）作为参数传入，最后汇总为单个返回值。
       * - 语法：
       *    - reduce(callbackFn)
       *    - reduce(callbackFn, initialValue)
       */
      const initialValue = 0
      const sum = nums.reduce((accumulator, currentValue) => accumulator + currentValue, initialValue)
      console.log(sum) // 150
      console.log('------------02------------')

      /**
       * 2. reduceRight() —— 【从右到左归约】
       *
       * - 功能：按【从右到左】的顺序应用一个函数。
       * - 原理：对累加器（accumulator）和数组的每个值进行计算，并使其成为单个值。
       * - 语法：
       *    - reduceRight(callbackFn)
       *    - reduceRight(callbackFn, initialValue)
       */
      nums = [10, 20, 30, 40, 50]
      // 示例：展示从右向左的累加
      const sumRight = nums.reduceRight((accumulator, currentValue) => accumulator + currentValue, initialValue)
      console.log(sumRight)
      console.log('------------03------------')

      /* 注：你原代码 03 部分使用了 flatMap，若需演示 reduceRight 的方向性，可以使用字符串拼接 */
      // const direction = ['a', 'b', 'c'].reduceRight((acc, cur) => acc + cur); // "cba"
    </script>
  </head>

  <body></body>
</html>
