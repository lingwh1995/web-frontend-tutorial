<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>字符串常用方法</title>
    <script>
      let str = 'ABCDEF'

      /**
       * charAt(index)
       * - 功能：查看指定索引位置的字符。
       */
      console.log(str.charAt(0))
      console.log('------------01------------')

      /**
       * charCodeAt(index)
       * - 功能：查看指定索引位置的字符的 Unicode 码。
       */
      console.log(str.charCodeAt(0))
      console.log('------------02------------')

      /**
       * concat()
       * - 功能：将字符串参数连接到调用的字符串上。
       * - 结果：返回一个新的字符串。
       */
      const price = '5'
      console.log(price.concat('元/双'))
      console.log('------------03------------')

      /**
       * endsWith() / startsWith()
       * - endsWith()  : 判断字符串是否以指定字符串结尾。
       * - startsWith() : 判断字符串是否以指定字符串开头。
       * - 返回值：Boolean (true/false)。
       */
      str = 'ABCDEF'
      console.log(str.endsWith('F'))
      console.log(str.endsWith('EF'))
      console.log(str.startsWith('A'))
      console.log(str.startsWith('AB'))
      console.log('------------04------------')

      /**
       * includes()
       * - 功能：执行区分大小写的搜索，确定是否可以在一个字符串中找到另一个字符串。
       * - 返回值：Boolean。
       */
      str = 'The quick brown fox jumps over the lazy dog.'
      let word = 'fox'
      console.log(str.includes(word))
      console.log('------------05------------')

      /**
       * indexOf() / lastIndexOf()
       * - indexOf()     : 返回子字符串第一次出现的索引。可接受起始位置参数。
       * - lastIndexOf()  : 返回子字符串最后一次出现的索引。可接受起始位置参数。
       */
      str = "I think Ruth's dog is cuter than your dog!"
      word = 'dog'
      console.log(str.indexOf(word))
      console.log(str.indexOf(word))
      console.log(str.lastIndexOf(word))
      console.log('------------06------------')

      /**
       * [ES6] padEnd() / padStart()
       * - padEnd()   : 从末尾开始填充给定字符串，直到达到给定长度。
       * - padStart() : 从开头开始填充给定字符串，直到达到给定长度。
       */
      str = 'abcde'
      console.log(str.padEnd(10, '.'))

      str = 'abcde'
      console.log(str.padStart(10, '.'))
      console.log('------------07------------')

      /**
       * repeat()
       * - 功能：构造并返回一个新字符串，包含指定数量的副本。
       */
      const mood = 'Happy! '
      console.log(`I feel ${mood.repeat(3)}`)
      console.log('------------08------------')

      /**
       * split()
       * - 功能：通过搜索模式将字符串分割成一个有序的子串列表。
       * - 返回值：Array (包含所有子串的数组)。
       */
      str = 'The quick brown fox jumps over the lazy dog.'
      const arr = str.split(' ')
      console.log(arr)
      console.log('------------09------------')

      /**
       * toLowerCase() / toUpperCase()
       * - toLowerCase() : 将字符串转换为小写形式。
       * - toUpperCase() : 将字符串转换为大写形式。
       */
      str = 'Hello World'
      console.log(str.toLowerCase())
      console.log(str.toUpperCase())
      console.log('------------10------------')

      /**
       * valueOf()
       * - 功能：返回 String 对象的原始字符串值。
       */
      const stringObj = new String('foo')
      console.log(stringObj.valueOf())
      console.log('------------11------------')
    </script>
  </head>
  <body></body>
</html>
