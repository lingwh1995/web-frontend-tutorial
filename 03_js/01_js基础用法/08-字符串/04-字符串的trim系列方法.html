<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>字符串的 trim 系列方法</title>
    <script>
      const str = '   Hello world!   '

      /**
       * trim()
       * - 功能：从字符串的【两端】移除空白字符。
       * - 结果：返回一个新字符串，不修改原始字符串。
       */
      console.log(str)
      console.log(str.trim())
      console.log('------------01------------')

      /**
       * trimEnd()
       * - 功能：从字符串的【结尾】移除空白字符。
       * - 结果：返回一个新字符串，不修改原始字符串。
       * - 别名：trimRight()
       */
      console.log(str)
      console.log(str.trimEnd())
      console.log('------------02------------')

      /**
       * trimStart()
       * - 功能：从字符串的【开头】移除空白字符。
       * - 结果：返回一个新字符串，不修改原始字符串。
       * - 别名：trimLeft()
       */
      console.log(str)
      console.log(str.trimStart())
      console.log('------------03------------')
    </script>
  </head>
  <body></body>
</html>
