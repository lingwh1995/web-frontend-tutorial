<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>对象的私有属性</title>
    <script>
      /**
       * ES11 特性：类（Class）的私有属性
       *
       * 1. 语法：在属性名前使用 # 符号进行修饰。
       * 2. 特点
       *    - 私有属性只能在类的内部（methods）被访问。
       *    - 在类外部直接调用（如 person.#age）会触发语法错误 (SyntaxError)。
       * 3. 意义：真正实现了面向对象编程中的“封装性”，防止外部非法修改内部核心数据。
       */
      class Person {
        // 1. 公有属性声明
        name

        // 2. 私有属性声明（必须先在类顶层声明才能在构造函数中使用）
        #age
        #weight

        constructor(name, age, weight) {
          this.name = name
          this.#age = age
          this.#weight = weight
        }

        /**
         * 内部方法：可以正常访问私有属性
         */
        show() {
          console.log(`公有属性 姓名：${this.name}`)
          console.log(`私有属性 年龄：${this.#age}, 体重：${this.#weight}`)
        }
      }

      // 实例化对象
      const person = new Person('张三', 20, '54kg')

      console.log(person) // 打印实例对象，可见私有属性受到保护
      console.log(person.name) // 正常访问公有属性

      // 【注意】直接访问私有属性会导致程序崩溃：
      // console.log(person.#age) // Uncaught SyntaxError: Private field '#age' must be declared in an enclosing class

      // 通过公有方法间接访问内部私有数据
      person.show()
    </script>
  </head>
  <body></body>
</html>
