<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>globalThis</title>
  </head>
  <body>
    <script>
      /**
       * ES11 特性：globalThis 标准全局对象
       *
       * 1. 背景：在不同的 JS 运行环境中，全局对象的名称不同：
       *    - 浏览器环境：window, self, frames
       *    - Node.js 环境：global
       *    - Web Workers：self
       * 2. 功能：globalThis 提供了一个标准化的方式来访问全局对象，无论代码运行在哪个环境。
       * 3. 意义：编写跨平台（通用/同构）代码时，无需再通过复杂的检测逻辑来寻找全局对象。
       */

      // 在浏览器中打印，结果为 Window 对象
      // 在 Node.js 中打印，结果为 global 对象
      console.log(globalThis)

      console.log('------------01------------')
    </script>
  </body>
</html>
