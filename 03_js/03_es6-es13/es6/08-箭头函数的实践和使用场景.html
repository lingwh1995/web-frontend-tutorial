<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>箭头函数的实践和使用场景</title>
    <style>
      .box {
        width: 200px;
        height: 200px;
        line-height: 200px;
        text-align: center;
        cursor: pointer;
        background-color: green;
      }
    </style>
    <script>
      /**
       * 箭头函数使用场景总结
       *
       * 1. 适合场景：与 this 无关的回调。如：定时器、数组的方法回调（filter, map, forEach 等）。
       * 2. 不适合场景：需要动态 this 的回调。如：DOM 事件回调、对象的方法（需访问对象属性时）、构造函数。
       */
      window.onload = () => {
        /**
         * 案例 1：点击两秒后改变背景颜色
         * 结合普通函数与箭头函数的特性：
         * - 外层使用普通函数以确保 this 指向事件源 (box)
         * - 内层定时器使用箭头函数，使其 this 自动捕获外层的 box 实例
         */
        const box = document.querySelector('.box')
        box.addEventListener('click', function () {
          // 这里的 this 指向 box 元素
          const this_ = this
          setTimeout(() => {
            // 定时器回调使用箭头函数，内部 this 继承自外部作用域
            this_.style.background = 'orange'
          }, 1000)
        })

        /**
         * 案例 2：返回数组中的偶数
         * 极其简洁的数组回调场景
         */
        const nums = [1, 2, 3, 4, 5, 6]
        const even = nums.filter((num) => num % 2 == 0)
        console.log(even)
      }
    </script>
  </head>
  <body>
    <div class="box">点击两秒后改变背景颜色</div>
  </body>
</html>
