<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>let声明变量以及特点</title>
    <script>
      /**
       * 声明与定义变量
       */
      // 声明一个变量
      let a
      // 一次性声明多个变量
      let b, c, d
      // 定义一个变量
      let e = 100
      // 一次性定义多个变量
      let f = 521,
        g = 'hello',
        h = []

      /**
       * 1. 变量不能重复声明
       */
      let i = 100
      // let i = 200;

      /**
       * 2. 块级作用域
       * let 定义的变量的作用域是块级作用域，var 定义的变量的作用域是全局/函数作用域
       */
      // {
      //   let block = 'block'
      // }
      // console.log(block)

      {
        var global = 'global'
      }
      console.log(global)

      /**
       * 3. 变量提升
       * let 定义的变量不存在变量提升，var 定义的变量存在变量提升
       */
      // console.log(j)
      // let j = 'hello'
      console.log(k)
      var k = 'hello'

      /**
       * 4. 作用域链
       * let 不影响作用域链的效果（内部依然可以访问外部作用域的变量）
       */
      {
        let school = '尚硅谷'
        const fn = () => {
          console.log(school)
        }
        fn()
      }
    </script>
  </head>
  <body></body>
</html>
