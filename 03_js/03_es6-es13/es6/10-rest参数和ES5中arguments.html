<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>rest参数和es5中arguments</title>
    <script>
      /**
       * 特别注意：
       * ES6 rest 参数必须放在形参列表的最后，否则会导致语法错误（SyntaxError）。
       */

      /**
       * ES5 获取参数方式：arguments
       * arguments 是一个“类数组”对象（Object），拥有 length 属性，但不支持数组的原生方法（如 filter, map 等）。
       */
      const nums = [1, 2, 3, 4, 5, 6]
      function testES5Arguments(a, b) {
        console.log(arguments)
        console.log(Array.isArray(arguments)) // false
      }
      testES5Arguments(10, 20)

      /**
       * ES6 获取参数方式：rest 参数
       * rest 参数（...args）是一个真正的数组对象，可以直接使用数组的所有 API。
       */

      // 场景 1：获取所有参数
      const testES6RestArguments1 = (...args) => {
        console.log(args)
        console.log(Array.isArray(args)) // true
      }
      testES6RestArguments1(100, 200, 300)

      // 场景 2：结合普通形参使用（rest 参数必须置后）
      const testES6RestArguments2 = (a, b, ...args) => {
        console.log(args) // 获取除了 a 和 b 之外的所有剩余参数
        console.log(Array.isArray(args)) // true
      }
      testES6RestArguments2(100, 200, 300, 400, 500)
    </script>
  </head>
  <body></body>
</html>
