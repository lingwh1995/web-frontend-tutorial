<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Promise对象_使用案例_封装ajax请求</title>
    <script>
      /**
       * 使用 Promise 封装原生 AJAX 请求
       * 优势：将异步的网络请求转化为状态可控的对象，便于链式调用和错误捕获。
       */
      const promise = new Promise((resolve, reject) => {
        // 1. 创建 XMLHttpRequest 对象
        const xhr = new XMLHttpRequest()

        // 2. 初始化：设置请求方式 (GET) 和 接口地址 (URL)
        xhr.open('GET', 'http://api.tianapi.com/film/index?key=74cb68c12016c1e9508bf6d5f981a7be&num=10')

        // 3. 发送请求
        xhr.send()

        // 4. 绑定事件：监听 readyState 变化，处理响应结果
        xhr.onreadystatechange = () => {
          // 判断请求阶段：4 表示请求已完成，且响应已就绪
          if (xhr.readyState === 4) {
            // 判断 HTTP 响应状态码：200~299 表示请求成功
            if (xhr.status >= 200 && xhr.status < 300) {
              /**
               * 成功：调用 resolve 传递服务器返回的数据
               */
              resolve(xhr.response)
            } else {
              /**
               * 失败：调用 reject 传递错误状态码
               */
              reject(xhr.status)
            }
          }
        }
      })

      /**
       * 处理结果
       */
      promise.then(
        (value) => {
          console.log('成功获取数据：', value)
        },
        (reason) => {
          console.warn('请求失败，状态码为：', reason)
        }
      )
    </script>
  </head>

  <body></body>
</html>
