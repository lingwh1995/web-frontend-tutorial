<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>面向对象_es6中getter和setter</title>
    <script>
      /**
       * ES6 访问器属性：Getter 与 Setter
       *
       * 1. 作用：对类的属性进行拦截，在读取或设置属性时执行特定的逻辑（如校验、转换、日志记录）。
       * 2. 表现：虽然在类内部定义为函数，但在外部访问时像普通属性一样，不需要加括号 ()。
       */
      class Phone {
        /**
         * getter (取值函数)
         * 当尝试读取 phone.price 时自动触发
         */
        get price() {
          console.log('价格属性被读取了...')
          return '$100'
        }

        /**
         * setter (存值函数)
         * 当尝试执行 phone.price = value 时自动触发
         * @param value 外部传入的新值
         */
        set price(value) {
          console.log('价格属性被设置了，新值为：', value)
          // 此处通常用于将值存储到另一个私有变量中
        }
      }

      const phone = new Phone()

      // 1. 设置 price 属性的值（触发 set price 逻辑）
      phone.price = '$200'

      // 2. 读取 price 属性的值（触发 get price 逻辑）
      console.log(phone.price)
    </script>
  </head>
  <body></body>
</html>
