<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>面向对象_es6中使用extends关键字实现继承</title>
    <script>
      /**
       * 父类定义
       *
       * 属性直接写在 constructor 中，方法直接写在类块里
       */
      class Animal {
        // 父类构造方法：初始化基础属性
        constructor(name) {
          this.name = name
        }

        // 父类方法：会被子类继承
        drink() {
          console.log('动物正在喝水...[我是父类方法]')
        }

        eat() {
          console.log('动物正在吃饭...[我是父类方法]')
        }
      }

      /**
       * 子类继承：extends 关键字
       *
       * 1. 语法：class 子类 extends 父类
       * 2. 效果：子类自动获得父类原型上的所有方法
       */
      class Pig extends Animal {
        constructor(name, color) {
          /**
           * super 关键字：
           * 1. 在子类构造器中必须先调用 super()，才能使用 this。
           * 2. 它负责调用父类的构造函数，完成父类属性的初始化。
           */
          super(name)
          this.color = color
        }

        // 子类特有方法
        sleep() {
          console.log(`${this.color}小猪${this.name}正在睡觉...[我是子类自身方法]`)
        }

        /**
         * 方法重写 (Override)：
         * 子类定义与父类同名的方法，调用时会优先匹配子类的方法。
         */
        eat() {
          console.log(`${this.color}小猪${this.name}正在吃饭...[我是子类重写父类方法]`)
        }
      }

      // 实例化子类
      const pig = new Pig('佩奇', '红色')

      // 1. 调用继承自父类的方法
      pig.drink()

      // 2. 调用子类定义的方法
      pig.sleep()

      // 3. 调用重写后的方法
      pig.eat()
    </script>
  </head>
  <body></body>
</html>
