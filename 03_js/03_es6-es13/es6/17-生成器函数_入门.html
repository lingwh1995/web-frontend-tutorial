<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>生成器函数_入门</title>
    <script>
      /**
       * 生成器函数 (Generator)
       *
       * 1. 作用：ES6 提供的一种异步编程解决方案，语法行为与传统函数完全不同。
       * 2. 特点：函数名与 function 关键字之间有一个星号 (*)，内部可以使用 yield 语句。
       * 3. 执行：调用生成器函数不会立即执行函数体，而是返回一个迭代器对象（Iterator）。
       */
      function* generator() {
        console.log('hello generator...')
      }

      // 获取迭代器对象
      const iterator = generator()

      // 执行下一次迭代（此时才会开始执行函数体内的代码）
      iterator.next()
    </script>
  </head>
  <body></body>
</html>
