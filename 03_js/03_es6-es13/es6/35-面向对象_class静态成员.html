<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>面向对象_class静态成员</title>
    <script>
      /**
       * ES5 定义静态成员
       *
       * 1. 静态属性直接挂载在构造函数对象上。
       * 2. 实例对象无法访问静态属性（实例只能通过原型链访问 prototype 上的属性）。
       */
      function Phone() {}
      // 定义静态属性
      Phone.brand = 'nokia'

      const nokia5230 = new Phone()
      console.log(nokia5230.brand) // 输出 undefined（实例不包含此属性）
      console.log(Phone.brand) // 输出 nokia（只有构造函数本身能访问）
      console.log('------------01------------')

      /**
       * ES6 定义静态成员
       *
       * 1. 使用 static 关键字在类内部声明。
       * 2. 静态成员属于类本身，不属于类的实例。
       * 3. 常见用途：工具方法、配置常量等不需要根据实例变化的数据。
       */
      class Car {
        // 静态属性：brand
        static brand = 'Audi'
      }

      const audiA8 = new Car()
      console.log(audiA8.brand) // 输出 undefined（实例无法直接访问静态成员）
      console.log(Car.brand) // 输出 Audi（通过类名直接访问）
      console.log('------------02------------')
    </script>
  </head>
  <body></body>
</html>
