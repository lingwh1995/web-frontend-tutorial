<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>面向对象_es5的构造函数和es6构造函数语法糖class关键字</title>
    <script>
      /**
       * ES5 传统写法
       *
       * 1. 构造函数：使用普通的 function 定义，通过 this 绑定属性。
       * 2. 方法绑定：需要手动将方法添加到 prototype 原型对象上，实现方法共享。
       */
      function Dog(name, age) {
        this.name = name
        this.age = age
      }

      // 在原型上添加方法，所有实例共享该方法，节省内存
      Dog.prototype.sayHello = function () {
        console.log(`你好，我是 ${this.name}，我今年 ${this.age} 岁了`)
      }

      const dogBlack = new Dog('小黑狗', 10)
      const dogWhite = new Dog('小白狗', 20)
      dogBlack.sayHello()
      dogWhite.sayHello()
      console.log('--------------------------')

      /**
       * ES6 Class 写法
       *
       * 1. 语法糖：本质仍然是基于原型的（Prototype-based），但写法更接近 Java/C# 等语言。
       * 2. 构造器：逻辑封装在 constructor 中，创建实例时自动触发。
       * 3. 方法定义：直接写在类块中，默认会被添加到类的原型（prototype）上。
       *
       * ES6 Class 的核心特性
       *
       * 1. 强制 new 调用：不可作为普通函数执行，安全性更高。
       * 2. 不可枚举性：类中定义的方法默认不可被 for...in 遍历。
       * 3. 严格模式：类内部代码默认运行在 "use strict" 下。
       * 4. 静态成员 (static)：属于类本身，不属于实例。
       * 5. 私有属性 (#)：真正的私有成员，外部无法访问。
       */

      /*
      // 进阶案例展示：
      class BankAccount {
          #balance = 0; // 私有属性：外部无法直接访问

          constructor(owner) {
              this.owner = owner;
          }

          deposit(amount) {
              this.#balance += amount;
              console.log(`存入后余额为: ${this.#balance}`);
          }

          static bankName() { // 静态方法：只能通过 BankAccount.bankName() 调用
              return "中央银行";
          }
      }
      */

      class Cat {
        // 构造器：初始化实例属性
        constructor(name, age) {
          this.name = name
          this.age = age
        }

        // 原型方法：语法简洁，无需手动操作 prototype
        sayHello() {
          console.log(`你好，我是 ${this.name}，我今年 ${this.age} 岁了`)
        }
      }

      const catBlack = new Cat('小黑猫', 30)
      const catWhite = new Cat('小白猫', 40)
      catBlack.sayHello()
      catWhite.sayHello()
      console.log('--------------------------')
    </script>
  </head>
  <body></body>
</html>
