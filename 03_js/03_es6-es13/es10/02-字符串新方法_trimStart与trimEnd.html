<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>字符串新方法_trimStart与trimEnd</title>
  </head>

  <body>
    <script>
      /**
       * ES10 字符串空白清除方法
       *
       * 1. trim()      : 清除字符串左右两端的所有空白字符（ES5 标准）。
       * 2. trimStart() : 仅清除字符串左侧（开头）的空白字符。
       * 3. trimEnd()   : 仅清除字符串右侧（结尾）的空白字符。
       *
       * 方法别名
       *
       * 1. trimLeft() 是 trimStart() 的别名。
       * 2. trimRight() 是 trimEnd() 的别名。
       */

      // 定义带有首尾空格的字符串
      let str = '   iloveyou   '

      // 原始状态
      console.log('原字符串：' + '[' + str + ']')

      // 清除左侧空格 (结果: "iloveyou   ")
      console.log('trimStart:', '[' + str.trimStart() + ']')

      // 清除右侧空格 (结果: "   iloveyou")
      console.log('trimEnd:  ', '[' + str.trimEnd() + ']')
    </script>
  </body>
</html>
