<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Object新方法_fromEntries</title>
  </head>

  <body>
    <script>
      /**
       * 1. Object.fromEntries(iterable) [ES10新增]
       * - 功能：将键值对列表（如二维数组或 Map）转换为一个对象。
       * - 入参：可迭代对象（Entries 结构）。
       * - 价值：Object.entries() 的逆向操作，常用于将 Map 或筛选后的数组转回对象。
       */

      // 示例 1：二维数组转对象
      let result = Object.fromEntries([
        ['name', '尚硅谷'],
        ['xueke', 'Java,大数据,前端,云计算'],
      ])
      console.log(result) // { name: "尚硅谷", xueke: "..." }

      // 示例 2：Map 转对象
      const m = new Map()
      m.set('name', 'ATGUIGU')
      result = Object.fromEntries(m)
      console.log(result) // { name: "ATGUIGU" }

      /**
       * 2. Object.entries(obj) [ES8引入]
       * - 功能：将对象转换为二维数组。
       * - 结构：每个子数组包含 [key, value]。
       */
      const arr = Object.entries({
        name: '西安财经大学',
      })
      console.log(arr) // [["name", "西安财经大学"]]
    </script>
  </body>
</html>
