<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>异步处理_async</title>
    <script>
      /**
       * async 函数：异步编程解决方案
       *
       * 1. 特点：使用 async 修饰的函数，其返回值总是一个 Promise 对象。
       * 2. 状态判定逻辑：
       *    - 返回非 Promise 类型（如字符串、undefined）：Promise 状态为 fulfilled（成功）。
       *    - 抛出错误（throw Error）：Promise 状态为 rejected（失败）。
       *    - 返回 Promise 对象：async 函数的状态由内部返回的这个 Promise 对象决定。
       */

      /**
       * async 函数：普通函数版
       */
      /*
      async function fun() {
        // 1. 返回字符串 -> 成功的 Promise，值为 '尚硅谷'
        // return '尚硅谷'

        // 2. 返回非 Promise (或不写 return) -> 成功的 Promise，值为 undefined
        // return

        // 3. 抛出错误 -> 失败的 Promise，原因为 '出错啦!'
        // throw new Error('出错啦!')
        
        // 4. 返回 Promise 对象 -> 状态由该 Promise 内部决定
        // return new Promise((resolve, reject) => {
        //   resolve('成功的数据')
        // })
      }

      const result = fun()
      console.log(result)

      // 只要是 Promise 对象，即可调用 then() 方法
      result.then(
        value => { console.log(value); }, 
        reason => { console.warn(reason); }
      )
      */

      /**
       * async 函数：ES6 箭头函数版
       */
      const fun = async () => {
        /**
         * 1. 返回字符串 -> 成功
         * return '尚硅谷'
         *
         * 2. 返回非 Promise -> 成功
         * return
         *
         * 3. 抛出错误 -> 失败
         * throw new Error('出错啦!')
         */

        // 4. 返回自定义 Promise 状态
        return new Promise((resolve, reject) => {
          // resolve('成功的数据')
          reject('失败的错误')
        })
      }

      const result = fun()
      console.log(result)

      // 处理异步结果
      result.then(
        (value) => {
          console.log(value)
        },
        (reason) => {
          console.log(reason)
        }
      )
    </script>
  </head>

  <body></body>
</html>
