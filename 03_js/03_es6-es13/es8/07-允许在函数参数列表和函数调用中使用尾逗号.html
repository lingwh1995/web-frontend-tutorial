<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>允许在函数参数列表和函数调用中使用尾逗号</title>
    <script>
      /**
       * ES8 特性：函数参数尾逗号 (Trailing Commas)
       *
       * 1. 功能：允许在函数定义（形参）和函数调用（实参）的最后一个参数后添加逗号。
       * 2. 核心优势：
       *    - 优化版本控制 (Git)：新增参数时，Diff 仅显示新增行，不会因为给上一行加逗号而产生多余的修改记录。
       *    - 简化代码维护：调整参数顺序或注释掉末尾参数时，无需频繁手动增删逗号。
       *    - 风格统一：使函数参数的写法与数组、对象字面量的尾逗号规则保持一致。
       *    - 向后兼容：现代转译工具（如 Babel）可完美处理，确保在旧环境中的稳定性。
       */

      // 函数定义中使用尾逗号
      const foo = (a, b, c) => {
        // ...
        console.log('函数执行成功')
      }

      // 函数调用中使用尾逗号
      foo(1, 2, 3)
    </script>
  </head>
  <body></body>
</html>
