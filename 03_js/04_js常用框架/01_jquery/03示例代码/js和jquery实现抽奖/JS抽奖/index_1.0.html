<html>
  <head>
    <title>js๏ฟฝ๏ฟฝ้ฝฑ1.0</title>
    <meta http-equiv="Content-Type" content="text/html;charaset=utf-8" />
    <script type="text/javascript">
      var myInterval
      function start() {
        myInterval = setInterval('test()', '100')
      }
      var names = ['a', 'b', 'c', 'd', 'e', 'f']
      var i = 0
      function test() {
        var spanTextTemp = document.getElementsByTagName('span')
        if (i == names.length) {
          i = 0
        }
        spanTextTemp[0].innerHTML = names[i]
        i++
      }
      function stop() {
        clearInterval(myInterval)
      }
    </script>
  </head>
  <body>
    <font color="green">๏ฟฝ๏ฟฝ๏ฟฝหน๏ฟฝ๏ฟฝฺฃ๏ฟฝ</font>
    <span style="color: red"></span>
    <input type="button" value="๏ฟฝ้ฝฑ" onclick="start()" />
    <input type="button" value="อฃึน" onclick="stop()" />
  </body>
</html>
