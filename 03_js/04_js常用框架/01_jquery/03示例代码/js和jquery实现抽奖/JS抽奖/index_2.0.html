<html>
  <head>
    <title>js๏ฟฝ๏ฟฝ้ฝฑ2.0</title>
    <meta http-equiv="Content-Type" content="text/html;charaset=utf-8" />
    <script type="text/javascript">
      var myInterval
      function choice() {
        var myvalue = document.getElementById('A').value
        if (myvalue == '๏ฟฝ๏ฟฝสผ') {
          document.getElementById('A').value = 'อฃึน'
          myInterval = setInterval('start()', '100')
        }
        if (myvalue == 'อฃึน') {
          document.getElementById('A').value = '๏ฟฝ๏ฟฝสผ'
          clearInterval(myInterval)
        }
      }
      var names = ['a', 'b', 'c', 'd', 'e', 'f']
      var i = 0
      function start() {
        var spanTextTemp = document.getElementsByTagName('span')
        if (i == names.length) {
          i = 0
        }
        spanTextTemp[0].innerHTML = names[i]
        i++
      }
    </script>
  </head>
  <body>
    <font color="green">๏ฟฝ๏ฟฝ๏ฟฝหน๏ฟฝ๏ฟฝฺฃ๏ฟฝ</font>
    <span style="color: red"></span>
    <input type="button" value="๏ฟฝ๏ฟฝสผ" onclick="choice()" id="A" />
  </body>
</html>
