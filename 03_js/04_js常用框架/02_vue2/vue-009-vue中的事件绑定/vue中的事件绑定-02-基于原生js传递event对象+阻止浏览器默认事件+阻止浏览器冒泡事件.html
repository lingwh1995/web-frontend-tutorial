<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>vue中的事件绑定-02-基于原生js传递event对象+阻止浏览器默认事件+阻止浏览器冒泡事件</title>
  </head>
  <body>
    <div id="app">
      <h1>事件处理-基于原生的JavaScript-阻止浏览器默认事件</h1>
      <a href="https://www.baidu.com" onclick="handleTestNativePreventDefault('阻止浏览器默认事件', event)">
        基于原生的JavaScript-阻止浏览器默认事件-点击显示提示信息
      </a>
      <br />

      <h1>事件处理-基于原生的JavaScript-阻止浏览器冒泡事件</h1>
      <div
        style="height: 30px; background-color: skyblue"
        onclick="handleTestNativeStopPropagation('阻止浏览器冒泡事件-父元素', event)"
      >
        <button onclick="handleTestNativeStopPropagation('阻止浏览器冒泡事件-子元素', event)">
          基于原生的JavaScript-阻止浏览器冒泡事件-点击显示提示信息
        </button>
      </div>
    </div>

    <script type="text/javascript">
      /**
       * 基于原生的JavaScript
       *
       * 1.阻止浏览器默认事件    event.preventDefault();
       * 2.阻止浏览器事件冒泡    event.stopPropagation();
       */
      const handleTestNativePreventDefault = (msg, e) => {
        // 兼容性写法
        var event = e || window.event
        /**
         * 阻止浏览器的默认事件
         *
         * 1.点击 <a href="/home"> 不跳转
         * 2.点击提交按钮 <button type="submit"> 不刷新页面
         * 3.右键菜单不弹出
         * 4.表单回车不提交
         */
        event.preventDefault()
        alert(msg)
      }

      const handleTestNativeStopPropagation = (msg, e) => {
        // 兼容性写法
        var event = e || window.event

        // 浏览器事件向上冒泡: 点子元素后先触发子元素事件，再触发父元素事件
        // event.stopPropagation()
        alert(msg)
      }
    </script>
  </body>
</html>
