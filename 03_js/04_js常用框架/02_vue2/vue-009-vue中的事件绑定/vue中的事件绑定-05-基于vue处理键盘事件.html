<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>vue中的事件绑定-05-基于vue处理键盘事件</title>
    <script type="text/javascript" src="../vue.js"></script>
  </head>

  <body>
    <div id="app">
      <h1>基于vue处理键盘事件</h1>

      输入后按下键盘回车键提示：
      <input type="text" placeholder="输入后按下键盘回车键提示" @keyup.enter="showTipByEnterKey" />
      <br />

      输入后按下键盘切换大小写键提示：
      <input type="text" placeholder="输入后按下键盘切换大小写键提示" @keyup="showTipByCapsLockKey_1" />
      <br />

      输入后按下键盘切换大小写键提示：
      <input type="text" placeholder="输入后按下键盘切换大小写键提示" @keyup.caps-lock="showTipByCapsLockKey_2" />
      <br />

      输入后按下键盘Ctrl键提示：
      <input type="text" placeholder="输入后按下键盘Ctrl键提示：" @keydown.ctrl="showTipByCtrlKey" />
      <br />

      输入后按下键盘Ctrl键+Y键提示[键盘事件小技巧]：
      <input type="text" placeholder="输入后按下键盘Ctrl键+Y键提示：" @keyup.ctrl.y="showTipByCtrlAndYKey" />
    </div>

    <script type="text/javascript">
      // 设置为 false 以阻止 vue 在启动时生成生产提示。
      Vue.config.productionTip = false

      /**
       * 1. vue中常用的键盘别名：
       * - 回车: enter
       * - 删除: delete (捕获“删除”和“退格”键)
       * - 退出: esc
       * - 空格: space
       * - 换行: tab (必须配合 keydown 使用)
       * - 上: up
       * - 下: down
       * - 左: left
       * - 右: right
       * * 2. 如果不使用别名，可以使用按键原始名称，但要注意多个单词组成的按键名要转为短横线命名。
       * * 3. 系统修饰键（用法特殊）：ctrl、alt、shift、meta
       * - 配合 keyup 使用：按下修饰键的同时，再按下其他键，随后释放其他键，事件才触发。
       * - 配合 keydown 使用：正常触发事件。
       */

      // 创建vue实例
      const vm = new Vue({
        el: '#app',
        methods: {
          /**
           * 按下回车键显示提示
           */
          showTipByEnterKey(event) {
            alert(event.target.value)
          },

          /**
           * 按下键盘切换大小写键提示: 实现方式1
           * 通过 keyCode 判断按键的方式已不推荐（MDN已废弃 keyCode）
           */
          showTipByCapsLockKey_1(event) {
            console.log('key:' + event.key + ', keyCode:' + event.keyCode)
            // CapsLock 按键的 keyCode 是 20
            if (event.keyCode === 20) {
              alert('CapsLock键被按下了...')
            }
          },

          /**
           * 按下键盘切换大小写键提示: 实现方式2 (推荐)
           */
          showTipByCapsLockKey_2() {
            alert('CapsLock键被按下了...')
          },

          /**
           * 按下键盘Ctrl键提示
           */
          showTipByCtrlKey() {
            alert('Ctrl键被按下了...')
          },

          /**
           * 按下键盘Ctrl键+Y键提示
           */
          showTipByCtrlAndYKey() {
            alert('Ctrl键+Y键被按下了...')
          },
        },
      })
    </script>
  </body>
</html>
